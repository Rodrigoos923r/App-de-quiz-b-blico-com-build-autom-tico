<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Quiz Bíblico</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #0f2027;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            width: 85%;
            max-width: 360px;
            padding: 25px;
            background: #203a43;
            border-radius: 15px;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { margin-bottom: 20px; color: #ffeb3b; }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 8px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #2c3e50;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 15px;
        }
        button.register-btn {
            background-color: transparent;
            color: #ffeb3b;
            text-decoration: underline;
            margin-top: 10px;
        }
        .msg { color: #ff5252; margin-top: 10px; font-size: 14px; }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Quiz Bíblico</h2>
    <input type="text" id="nome" placeholder="Seu Nome (Para o Ranking)">
    <input type="email" id="email" placeholder="Seu E-mail">
    <input type="password" id="password" placeholder="Sua Senha">
    
    <button id="btnLogin">Entrar</button>
    <button id="btnCadastrar" class="register-btn">Criar Nova Conta</button>
    
    <div id="mensagemErro" class="msg"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>

<script src="js/firebase-auth.js"></script>

</body>
</html>
