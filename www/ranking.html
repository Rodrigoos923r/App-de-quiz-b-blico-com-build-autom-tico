
<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard - Quiz Bíblico</title><style>
body{
    font-family:Arial,sans-serif;
    background:#0b111e;
    color:#fff;
    margin:0;
    padding:20px;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
    box-sizing:border-box;
}

h2{
    color:#4ce1b6;
    margin-bottom:20px;
}

.podium-container{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    width:100%;
    max-width:400px;
    gap:10px;
    margin-bottom:25px;
}

.podium-card{
    background:linear-gradient(135deg,#201a30,#2f2546);
    border-radius:12px;
    padding:15px 10px;
    text-align:center;
    flex:1;
    border:1px solid #3d3056;
}

.podium-card.first{
    background:linear-gradient(135deg,#ffca28,#ff8f00);
    color:#000;
    transform:scale(1.08);
}

.avatar{
    width:45px;
    height:45px;
    background:#fff;
    border-radius:50%;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:center;
}

.name{
    font-size:13px;
    font-weight:bold;
}

.xp{
    color:#00e676;
    font-size:11px;
    font-weight:bold;
}

.ranking-list{
    width:100%;
    max-width:400px;
    background:#131a26;
    border:2px solid #1f2d40;
    border-radius:16px;
    padding:10px;
    box-sizing:border-box;
}

.ranking-item{
    display:flex;
    align-items:center;
    padding:12px 10px;
    border-bottom:1px solid #1f2d40;
}

.ranking-item:last-child{
    border-bottom:none;
}

.position{
    width:30px;
    font-weight:bold;
}

.item-avatar{
    width:35px;
    height:35px;
    border-radius:50%;
    background:#2a3b50;
    margin-right:12px;
}

.item-name{
    flex:1;
}

.item-xp{
    color:#4ce1b6;
    font-weight:bold;
}

.btn-home{
    margin-top:20px;
    padding:12px 30px;
    background:#2f2546;
    border:1px solid #4ce1b6;
    color:#4ce1b6;
    border-radius:20px;
}
</style></head><body><h2>Leaderboard</h2><div class="podium-container"><div class="podium-card">
<div class="avatar">🥈</div>
<div class="name" id="top2-name">Carregando...</div>
<div class="xp" id="top2-xp">0 XP</div>
</div><div class="podium-card first">
<div class="avatar">🥇</div>
<div class="name" id="top1-name">Carregando...</div>
<div class="xp" id="top1-xp">0 XP</div>
</div><div class="podium-card">
<div class="avatar">🥉</div>
<div class="name" id="top3-name">Carregando...</div>
<div class="xp" id="top3-xp">0 XP</div>
</div></div><div class="ranking-list" id="listaRanking"></div><button class="btn-home" onclick="window.location.href='index.html'">
HOME
</button><script>
window.onerror=function(msg,url,line){
    alert("Erro:\n"+msg+"\nLinha: "+line);
};
</script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script><script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script><script>

const firebaseConfig={
apiKey:"AIzaSyBZPQu9a5rqGBLRLIyJsyh9SVrEqE3FCZc",
authDomain:"quiz-biblico-8bcdb.firebaseapp.com",
projectId:"quiz-biblico-8bcdb",
storageBucket:"quiz-biblico-8bcdb.firebasestorage.app",
messagingSenderId:"989946576987",
appId:"1:989946576987:web:fdf5dd684cca1c3dc0bf7e"
};

if (!firebase.apps.length) {
    firebase.initializeApp(firebaseConfig);
}

const db=firebase.firestore();

function obterNome(user){

if(!user) return "Jogador";

if(typeof user.nome==="string" && user.nome.trim()!==""){
return user.nome.trim();
}

if(typeof user.email==="string" && user.email.includes("@")){
return user.email.split("@")[0];
}

return "Jogador Anônimo";
}

db.collection("usuarios")
.orderBy("pontos","desc")
.limit(10)
.get()
.then((querySnapshot)=>{

const lista=document.getElementById("listaRanking");
lista.innerHTML="";

const arrUsers=[];

querySnapshot.forEach((doc)=>{
arrUsers.push(doc.data());
});

if(arrUsers.length===0){

document.getElementById("top1-name").innerText="Sem jogadores";
document.getElementById("top2-name").innerText="-";
document.getElementById("top3-name").innerText="-";

lista.style.display="none";
return;
}

if(arrUsers[0]){
document.getElementById("top1-name").innerText=obterNome(arrUsers[0]);
document.getElementById("top1-xp").innerText=(arrUsers[0].pontos||0)+" XP";
}

if(arrUsers[1]){
document.getElementById("top2-name").innerText=obterNome(arrUsers[1]);
document.getElementById("top2-xp").innerText=(arrUsers[1].pontos||0)+" XP";
}

if(arrUsers[2]){
document.getElementById("top3-name").innerText=obterNome(arrUsers[2]);
document.getElementById("top3-xp").innerText=(arrUsers[2].pontos||0)+" XP";
}

for(let i=3;i<arrUsers.length;i++){

const user=arrUsers[i];

lista.innerHTML+=`
<div class="ranking-item">
<div class="position">${i+1}º</div>
<div class="item-avatar"></div>
<div class="item-name">${obterNome(user)}</div>
<div class="item-xp">${user.pontos||0} XP</div>
</div>
`;
}

})
.catch((err)=>{

console.error(err);

alert(
"Erro ao carregar ranking\n\n"+
(err.code||"erro-desconhecido")+
"\n\n"+
err.message
);

});

</script></body>
</html>
