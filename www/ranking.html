<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - Quiz Bíblico</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0b111e; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; box-sizing: border-box; }
        h2 { color: #4ce1b6; margin-bottom: 20px; }
        .loader { border: 4px solid #1f2d40; border-top: 4px solid #4ce1b6; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #loading-state { text-align: center; color: #4ce1b6; width: 100%; }
        .podium-container { display: flex; justify-content: center; align-items: flex-end; width: 100%; max-width: 400px; gap: 10px; margin-bottom: 25px; display: none; }
        .podium-card { background: linear-gradient(135deg, #201a30, #2f2546); border-radius: 12px; padding: 15px 10px; text-align: center; flex: 1; border: 1px solid #3d3056; }
        .podium-card.first { background: linear-gradient(135deg, #ffca28, #ff8f00); color: #000; transform: scale(1.08); }
        .avatar { width: 45px; height: 45px; background: #fff; border-radius: 50%; margin: auto; display: flex; align-items: center; justify-content: center; }
        .name { font-size: 13px; font-weight: bold; margin-top: 5px; }
        .xp { color: #00e676; font-size: 11px; font-weight: bold; }
        .podium-card.first .xp { color: #000; }
        .ranking-list { width: 100%; max-width: 400px; background: #131a26; border: 2px solid #1f2d40; border-radius: 16px; padding: 10px; box-sizing: border-box; display: none; }
        .ranking-item { display: flex; align-items: center; padding: 12px 10px; border-bottom: 1px solid #1f2d40; }
        .ranking-item:last-child { border-bottom: none; }
        .position { width: 30px; font-weight: bold; }
        .item-avatar { width: 35px; height: 35px; border-radius: 50%; background: #2a3b50; margin-right: 12px; }
        .item-name { flex: 1; }
        .item-xp { color: #4ce1b6; font-weight: bold; }
        .btn-home { margin-top: 20px; padding: 12px 30px; background: #2f2546; border: 1px solid #4ce1b6; color: #4ce1b6; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>

    <h2>Leaderboard</h2>

    <div id="loading-state">
        <div class="loader"></div>
        <p>Buscando todos os registros...</p>
    </div>

    <div class="podium-container" id="podium">
        <div class="podium-card">
            <div class="avatar">🥈</div>
            <div class="name" id="top2-name">-</div>
            <div class="xp" id="top2-xp">0 XP</div>
        </div>
        <div class="podium-card first">
            <div class="avatar">🥇</div>
            <div class="name" id="top1-name">-</div>
            <div class="xp" id="top1-xp">0 XP</div>
        </div>
        <div class="podium-card">
            <div class="avatar">🥉</div>
            <div class="name" id="top3-name">-</div>
            <div class="xp" id="top3-xp">0 XP</div>
        </div>
    </div>

    <div class="ranking-list" id="listaRanking"></div>

    <button class="btn-home" onclick="window.location.href='index.html'">HOME</button>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyBZPQu9a5rqGBLRLIyJsyh9SVrEqE3FCZc",
            authDomain: "quiz-biblico-8bcdb.firebaseapp.com",
            projectId: "quiz-biblico-8bcdb",
            storageBucket: "quiz-biblico-8bcdb.firebasestorage.app",
            messagingSenderId: "989946576987",
            appId: "1:989946576987:web:fdf5dd684cca1c3dc0bf7e"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();

        function obterNome(user) {
            if (!user) return "Jogador";
            if (typeof user.nome === "string" && user.nome.trim() !== "") return user.nome.trim();
            if (typeof user.email === "string" && user.email.includes("@")) return user.email.split("@")[0];
            return "Jogador Anônimo";
        }

        console.log("🔥 [DEBUG] Executando busca de FORÇA BRUTA (sem orderBy)...");

        // BUSCA TODOS OS DOCUMENTOS SEM FILTRO!
        db.collection("usuarios")
            .get()
            .then((querySnapshot) => {
                document.getElementById("loading-state").style.display = "none";
                document.getElementById("podium").style.display = "flex";
                const lista = document.getElementById("listaRanking");
                
                let arrUsers = [];
                
                querySnapshot.forEach((doc) => {
                    const dados = doc.data();
                    
                    // O pulo do gato: procura a pontuação não importa o nome que esteja no banco
                    const pontuacaoReal = dados.pontos || dados.XP || dados.pontuacao || 0;
                    
                    console.log(`📄 [DEBUG] Jogador ${doc.id} tem: pontos(${dados.pontos}), XP(${dados.XP}) -> Validado como: ${pontuacaoReal}`);
                    
                    arrUsers.push({
                        id: doc.id,
                        pontosValidados: pontuacaoReal,
                        ...dados
                    });
                });

                // ORDENAÇÃO FORÇADA PELO JAVASCRIPT
                arrUsers.sort((a, b) => b.pontosValidados - a.pontosValidados);

                // Corta para os Top 10
                arrUsers = arrUsers.slice(0, 10);

                if (arrUsers.length === 0) {
                    console.warn("⚠️ [DEBUG] NENHUM usuário encontrado no banco de dados.");
                    document.getElementById("top1-name").innerText = "Sem jogadores";
                    return;
                }

                lista.style.display = "block";
                lista.innerHTML = "";

                const preencherCard = (posicao, user) => {
                    if(user) {
                        document.getElementById(`top${posicao}-name`).innerText = obterNome(user);
                        document.getElementById(`top${posicao}-xp`).innerText = user.pontosValidados + " XP";
                    }
                };

                preencherCard(1, arrUsers[0]);
                preencherCard(2, arrUsers[1]);
                preencherCard(3, arrUsers[2]);

                for (let i = 3; i < arrUsers.length; i++) {
                    const user = arrUsers[i];
                    lista.innerHTML += `
                        <div class="ranking-item">
                            <div class="position">${i + 1}º</div>
                            <div class="item-avatar"></div>
                            <div class="item-name">${obterNome(user)}</div>
                            <div class="item-xp">${user.pontosValidados} XP</div>
                        </div>
                    `;
                }
            })
            .catch((err) => {
                document.getElementById("loading-state").innerHTML = `<p style="color:#ff4c4c">Erro: ${err.message}</p>`;
                console.error("❌ [ERRO FIRESTORE]:", err);
            });
    </script>
</body>
</html>
